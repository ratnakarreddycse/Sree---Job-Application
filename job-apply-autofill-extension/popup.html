<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Autofill</title>
  <style>
    body {
      margin: 0;
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 12px;
    }
    h1 { font-size: 14px; margin: 0 0 10px; }
    h2 { font-size: 12px; margin: 12px 0 6px; color: #7dd3fc; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    input, textarea {
      width: 100%; box-sizing: border-box;
      background: #020617; color: #e2e8f0;
      border: 1px solid #334155; border-radius: 6px;
      padding: 7px 8px; font-size: 12px;
    }
    textarea { min-height: 70px; resize: vertical; }
    .row { display: grid; grid-template-columns: 1.2fr 1fr; gap: 6px; }
    button {
      width: 100%; border: none; border-radius: 8px;
      padding: 8px 10px; margin-top: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      background: linear-gradient(90deg, #22d3ee, #34d399);
      color: #052e2b;
    }
    .muted { color: #94a3b8; font-size: 11px; line-height: 1.4; margin-top: 6px; }
    .status { font-size: 11px; margin-top: 8px; color: #a7f3d0; min-height: 16px; }
  </style>
</head>
<body>
  <h1>Job Autofill Helper</h1>

  <h2>Profile</h2>
  <div class="grid">
    <input id="full_name" placeholder="Full name" />
    <input id="email" placeholder="Email" />
    <input id="phone" placeholder="Phone" />
    <input id="linkedin" placeholder="LinkedIn URL" />
    <input id="location" placeholder="Location" />
    <input id="work_authorization" placeholder="Work authorization" />
  </div>
  <input id="needs_sponsorship" placeholder="Needs sponsorship (Yes/No)" />

  <h2>Remember One Q/A</h2>
  <div class="row">
    <input id="question" placeholder="Question text" />
    <input id="answer" placeholder="Answer" />
  </div>

  <button id="save-memory">Save Memory</button>
  <button id="sync-dashboard">Sync From Dashboard (localhost)</button>
  <button id="run-autofill">Run Autofill On This Tab</button>

  <div id="resume-panel" style="display:none;margin-top:10px;border:1px solid #334155;border-radius:8px;padding:8px;">
    <h2 style="margin:0 0 6px;">Resume for This Job</h2>
    <div id="resume-info" class="muted"></div>
    <div id="resume-pdf-status" style="display:none;margin-top:6px;font-size:11px;line-height:1.5;"></div>
    <button id="open-downloads" style="margin-top:6px;background:linear-gradient(90deg,#34d399,#22d3ee);">📂 Open Downloads Folder</button>
    <button id="copy-resume-path" style="margin-top:4px;">Copy .md Resume Path</button>
  </div>

  <h2>Import/Export (JSON)</h2>
  <textarea id="memory-json" placeholder='Paste memory JSON here'></textarea>
  <button id="import-json">Import JSON</button>
  <button id="export-json">Export JSON To Text Area</button>

  <div class="muted">
    Tip: first time you answer a custom screening question, store it here.
    Next time on similar forms, autofill will reuse it.
  </div>
  <div id="status" class="status"></div>

  <script src="popup.js"></script>
</body>
</html>
